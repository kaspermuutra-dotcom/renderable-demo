<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Renderable — Capture</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; color: #fff; font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; }
  #camera-container { position: relative; width: 100%; height: 100vh; }
  #video { width: 100%; height: 100%; object-fit: cover; }
  #overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 50px 20px 40px; }
  #title { font-size: 18px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; background: rgba(0,0,0,0.5); padding: 8px 16px; border-radius: 20px; }
  #center-info { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  #angle-display { font-size: 64px; font-weight: 800; text-shadow: 0 0 30px rgba(255,255,255,0.4); }
  #gyro-indicator { font-size: 13px; color: rgba(255,255,255,0.6); background: rgba(0,0,0,0.4); padding: 6px 14px; border-radius: 20px; }
  #instructions { font-size: 14px; color: rgba(255,255,255,0.8); text-align: center; background: rgba(0,0,0,0.5); padding: 8px 16px; border-radius: 20px; max-width: 280px; line-height: 1.5; }
  #controls { display: flex; flex-direction: column; align-items: center; gap: 16px; width: 100%; }
  #progress-bar { display: flex; gap: 10px; justify-content: center; }
  .angle-dot { width: 14px; height: 14px; border-radius: 50%; background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.4); transition: all 0.3s; }
  .angle-dot.captured { background: #43e97b; border-color: #43e97b; }
  .angle-dot.current { background: #fff; border-color: #fff; transform: scale(1.4); }
  #camera-toggle { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 8px 20px; border-radius: 20px; font-size: 13px; cursor: pointer; }
  #capture-btn { width: 86px; height: 86px; border-radius: 50%; background: #fff; border: 5px solid rgba(255,255,255,0.4); cursor: pointer; transition: transform 0.1s; box-shadow: 0 0 40px rgba(255,255,255,0.2); }
  #capture-btn:active { transform: scale(0.88); }
  #capture-btn.capturing { background: #43e97b; }
  #view-btn { display: none; background: #43e97b; color: #000; border: none; padding: 18px 48px; border-radius: 30px; font-size: 18px; font-weight: 700; cursor: pointer; }
  #status { font-size: 13px; color: #43e97b; min-height: 20px; text-align: center; }
  #processing { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); flex-direction: column; align-items: center; justify-content: center; gap: 20px; z-index: 100; }
  .spinner { width: 48px; height: 48px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #43e97b; border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="camera-container">
  <video id="video" autoplay playsinline></video>
  <div id="overlay">
    <div id="title">Renderable</div>
    <div id="center-info">
      <div id="angle-display">0°</div>
      <div id="gyro-indicator">🔄 Rotate to next angle</div>
    </div>
    <div id="instructions">Stand in the center. Face forward and tap capture.</div>
    <div id="controls">
      <div id="progress-bar"></div>
      <div id="status"></div>
      <button id="camera-toggle" onclick="toggleCamera()">0.5x Wide</button>
      <button id="capture-btn" onclick="capturePhoto()"></button>
      <button id="view-btn" onclick="viewScan()">View 360° →</button>
    </div>
  </div>
</div>

<div id="processing">
  <div class="spinner"></div>
  <div style="font-size:16px;">Building your 360° view...</div>
</div>

<script>
const ANGLES = [0, 45, 90, 135, 180, 225, 270, 315];
const ANGLE_NAMES = ['Forward', 'Right 45°', 'Right 90°', 'Behind Right', 'Behind', 'Behind Left', 'Left 90°', 'Left 45°'];
let currentAngleIndex = 0;
let capturedAngles = [];
let scanId = 'scan_' + Date.now();
let stream = null;
let useWide = false;
let deviceAlpha = 0;
let lastCapturedAlpha = null;

async function startCamera() {
  if (stream) stream.getTracks().forEach(t => t.stop());
  try {
    const constraints = {
      video: {
        facingMode: 'environment',
        width: { ideal: 1920 },
        height: { ideal: 1080 }
      }
    };
    if (useWide) {
      constraints.video.zoom = 0.5;
    }
    stream = await navigator.mediaDevices.getUserMedia(constraints);
    document.getElementById('video').srcObject = stream;
  } catch(e) {
    alert('Camera access needed. Please allow camera in Safari settings.');
  }
}

function toggleCamera() {
  useWide = !useWide;
  document.getElementById('camera-toggle').textContent = useWide ? '1x Normal' : '0.5x Wide';
  startCamera();
}

function startGyroscope() {
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().then(state => {
      if (state === 'granted') listenGyro();
    }).catch(() => {});
  } else {
    listenGyro();
  }
}

function listenGyro() {
  window.addEventListener('deviceorientation', (e) => {
    if (e.alpha !== null) {
      deviceAlpha = e.alpha;
      updateGyroIndicator();
    }
  });
}

function updateGyroIndicator() {
  if (currentAngleIndex >= ANGLES.length) return;
  const target = ANGLES[currentAngleIndex];
  const current = deviceAlpha;
  let diff = Math.abs(current - target);
  if (diff > 180) diff = 360 - diff;
  
  if (diff < 15) {
    document.getElementById('gyro-indicator').textContent = '✅ Good angle — tap capture!';
    document.getElementById('gyro-indicator').style.color = '#43e97b';
  } else {
    document.getElementById('gyro-indicator').textContent = `🔄 Rotate to ${ANGLE_NAMES[currentAngleIndex]}`;
    document.getElementById('gyro-indicator').style.color = 'rgba(255,255,255,0.6)';
  }
}

function buildProgressBar() {
  const bar = document.getElementById('progress-bar');
  bar.innerHTML = '';
  ANGLES.forEach((angle, i) => {
    const dot = document.createElement('div');
    dot.className = 'angle-dot' + 
      (capturedAngles.includes(angle) ? ' captured' : '') +
      (i === currentAngleIndex ? ' current' : '');
    bar.appendChild(dot);
  });
}

function updateUI() {
  if (currentAngleIndex < ANGLES.length) {
    document.getElementById('angle-display').textContent = ANGLES[currentAngleIndex] + '°';
    document.getElementById('instructions').textContent = 
      currentAngleIndex === 0 
        ? 'Stand in center. Face forward and capture.' 
        : `Rotate to face ${ANGLE_NAMES[currentAngleIndex]} and capture.`;
  }
  buildProgressBar();
}

async function capturePhoto() {
  const video = document.getElementById('video');
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);

  canvas.toBlob(async (blob) => {
    const angle = ANGLES[currentAngleIndex];
    const formData = new FormData();
    formData.append('photo', blob, 'photo.jpg');
    formData.append('scan_id', scanId);
    formData.append('angle', angle);

    document.getElementById('capture-btn').classList.add('capturing');
    document.getElementById('status').textContent = 'Saving...';

    try {
      await fetch('/upload', { method: 'POST', body: formData });
      capturedAngles.push(angle);
      document.getElementById('status').textContent = '✓ ' + ANGLE_NAMES[currentAngleIndex] + ' captured';

      currentAngleIndex++;
      if (currentAngleIndex < ANGLES.length) {
        setTimeout(() => {
          document.getElementById('capture-btn').classList.remove('capturing');
          document.getElementById('status').textContent = '';
          updateUI();
        }, 700);
      } else {
        document.getElementById('angle-display').textContent = '360°';
        document.getElementById('instructions').textContent = 'All angles captured!';
        document.getElementById('status').textContent = '✅ Complete!';
        document.getElementById('capture-btn').style.display = 'none';
        document.getElementById('camera-toggle').style.display = 'none';
        document.getElementById('gyro-indicator').style.display = 'none';
        buildProgressBar();
        await stitchAndView();
      }
    } catch(e) {
      document.getElementById('status').textContent = 'Error — try again';
      document.getElementById('capture-btn').classList.remove('capturing');
    }
  }, 'image/jpeg', 0.92);
}

async function stitchAndView() {
  document.getElementById('processing').style.display = 'flex';
  try {
    await fetch('/stitch/' + scanId, { method: 'POST' });
  } catch(e) {}
  document.getElementById('processing').style.display = 'none';
  document.getElementById('view-btn').style.display = 'block';
}

function viewScan() {
  window.location.href = '/view/' + scanId;
}

startCamera();
startGyroscope();
updateUI();
</script>
</body>
</html>
